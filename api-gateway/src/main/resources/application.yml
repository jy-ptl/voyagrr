server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/auth/**, /api/user/**
            - id: storage-service
              uri: lb://storage-service
              predicates:
                - Path=/api/storage/**, /api/directory/**
            - id: sharing-service
              uri: lb://sharing-service
              predicates:
                - Path=/api/share/**, /api/group/**
            - id: encoding-service
              uri: lb://encoding-service
              predicates:
                - Path=/api/encode/**
            - id: processing-service
              uri: lb://processing-service
              predicates:
                - Path=/api/process/**

            - id: user-service-prometheus
              uri: lb://user-service
              predicates:
                - Path=/user-service/actuator/prometheus
              filters:
                - StripPrefix=1

            - id: storage-service-prometheus
              uri: lb://storage-service
              predicates:
                - Path=/storage-service/actuator/prometheus
              filters:
                - StripPrefix=1

            - id: sharing-service-prometheus
              uri: lb://sharing-service
              predicates:
                - Path=/sharing-service/actuator/prometheus
              filters:
                - StripPrefix=1

            - id: encoding-service-prometheus
              uri: lb://encoding-service
              predicates:
                - Path=/encoding-service/actuator/prometheus
              filters:
                - StripPrefix=1

            - id: processing-service-prometheus
              uri: lb://processing-service
              predicates:
                - Path=/processing-service/actuator/prometheus
              filters:
                - StripPrefix=1
