apiVersion: 1
datasources:
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false

    jsonData:
      httpMethod: GET

      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-2m"
        spanEndTimeShift: "2m"
        tags: ["service.name"]
        filterByTraceID: true
        filterBySpanID: true

      serviceMap:
        datasourceUid: Prometheus
