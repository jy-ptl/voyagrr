apiVersion: 1
datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: traceId
          matcherRegex: traceId=([a-f0-9]+)
          datasourceUid: tempo
          urlDisplayLabel: "View Trace"
          url: '$${__value.raw}'
