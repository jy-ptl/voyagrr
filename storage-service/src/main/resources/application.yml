server:
  port: 8082
  forward-headers-strategy: framework

spring:
  application:
    name: storage-service

  profiles:
    active: local

management:
  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: storage-service

  prometheus:
    metrics:
      export:
        enabled: true

grpc:
  server:
    port: 9091