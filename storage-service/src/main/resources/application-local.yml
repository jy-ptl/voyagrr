spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8070/realms/voyagrr

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog.master.yaml

  datasource:
    url: jdbc:postgresql://localhost:5435/storage_service_database
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket: voyagrr-media

grpc:
  client:
    sharing-service:
      address: static://localhost:9090
      negotiationType: plaintext

  server:
    port: 9091

management:
  endpoints:
    web:
      exposure:
        include: "*"
