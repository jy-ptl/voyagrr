server:
  port: 8083
  forward-headers-strategy: framework

spring:
  application:
    name: sharing-service
  liquibase:
  enabled: true
  change-log: classpath:db/changelog/db.changelog.master.yaml

logging:
  level:
    liquibase: INFO

management:
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: sharing-service
  prometheus:
    metrics:
      export:
        enabled: true
