services:
  keycloak-database:
    image: postgres:17
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak123
    ports:
      - '5433:5432'
    volumes:
      - keycloak-database-data:/var/lib/postgresql/data
    networks:
      - voyagrr-net

  user-service-database:
    image: postgres:17
    environment:
      POSTGRES_DB: user_service_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - user-database-data:/var/lib/postgresql/data
    networks:
      - voyagrr-net

  storage-service-database:
    image: postgres:17
    environment:
      POSTGRES_DB: storage_service_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5435:5432'
    volumes:
      - storage-database-data:/var/lib/postgresql/data
    networks:
      - voyagrr-net

  encoding-service-database:
    image: postgres:17
    environment:
      POSTGRES_DB: encoding_service_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5437:5432'
    volumes:
      - encoding-database-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - voyagrr-net
    
  processing-service-database:
    image: postgres:17
    environment:
      POSTGRES_DB: processing_service_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5438:5432'
    volumes:
      - processing-database-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - voyagrr-net

  metadata-service-database:
    image: postgres:17
    environment:
      POSTGRES_DB: metadata_service_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5439:5432'
    volumes:
      - metadata-database-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - voyagrr-net

  analysis-service-database:
    image: postgres:17
    environment:
      POSTGRES_DB: analysis_service_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5440:5432'
    volumes:
      - analysis-database-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - voyagrr-net

  trip-service-database:
    image: postgres:17
    environment:
      POSTGRES_DB: trip_service_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5441:5432'
    volumes:
      - trip-database-data:/var/lib/postgresql/data
    networks:
      - voyagrr-net

  recognition-service-database:
    image: postgres:17
    environment:
      POSTGRES_DB: recognition_service_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5442:5432'
    volumes:
      - recognition-database-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - voyagrr-net

  eureka:
    build:
      context: .
      dockerfile: discovery-service/Dockerfile
    ports:
      - '8761:8761'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - voyagrr-net

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - '8080:8080'
    depends_on:
      eureka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - voyagrr-net

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    command: start-dev --import-realm
    depends_on:
      - keycloak-database
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-database:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
      KC_HTTP_PORT: 8070
    volumes:
      - ./realms:/opt/keycloak/data/import
    ports:
      - "8070:8070"
    networks:
      - voyagrr-net

  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - voyagrr-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9080:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - voyagrr-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - '3000:3000'
    depends_on:
      - prometheus
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-storage:/var/lib/grafana
    networks:
      - voyagrr-net

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml
      - ./loki/data:/loki
    networks:
      - voyagrr-net

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    volumes:
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - voyagrr-net
  
  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    command: [ "-config.file=/etc/tempo/tempo.yml" ]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml
      - ./tempo/data:/var/tempo
    ports:
      - "3200:3200"   # Tempo API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - voyagrr-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - voyagrr-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - voyagrr-net

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    networks:
      - voyagrr-net

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    labels:
      logging: voyagrr
      service: user-service
    ports:
      - '8081:8081'
    depends_on:
      - eureka
      - api-gateway
      - user-service-database
      - keycloak
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-service-database:5432/user_service_database
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - voyagrr-net

  storage-service:
    build:
      context: .
      dockerfile: storage-service/Dockerfile
    labels:
      logging: voyagrr
      service: storage-service
    ports:
      - '8082:8082'
      - '9090:9090'
    depends_on:
      - eureka
      - api-gateway
      - storage-service-database
      - minio
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://storage-service-database:5432/storage_service_database
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - voyagrr-net

  trip-service:
    build:
      context: .
      dockerfile: trip-service/Dockerfile
    labels:
      logging: voyagrr
      service: trip-service
    ports:
      - '8086:8086'
    depends_on:
      - eureka
      - api-gateway
      - trip-service-database
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://trip-service-database:5432/trip_service_database
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - voyagrr-net

  encoding-service:
    build: ./encoding-service
    environment:
      ENV: docker
    depends_on:
      kafka:
        condition: service_healthy
      encoding-service-database:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - voyagrr-net

  processing-service:
    build:
      context: .
      dockerfile: processing-service/Dockerfile
    labels:
      logging: voyagrr
      service: processing-service
    ports:
      - '8085:8085'
      - '9091:9091'
    depends_on:
      kafka:
        condition: service_healthy
      api-gateway:
        condition: service_started
      eureka:
        condition: service_started
      processing-service-database:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://processing-service-database:5432/processing_service_database
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - voyagrr-net

  metadata-service:
    build: ./metadata-service
    environment:
      ENV: docker
    depends_on:
      kafka:
        condition: service_healthy
      metadata-service-database:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - voyagrr-net

  analysis-service:
    build:
      context: ./analysis-service
    environment:
      ENV: docker
    depends_on:
      kafka:
        condition: service_healthy
      analysis-service-database:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - voyagrr-net
    volumes:
      - analysis-models:/models

  recognition-service:
    build:
      context: ./recognition-service
    environment:
      ENV: docker
    depends_on:
      kafka:
        condition: service_healthy
      recognition-service-database:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - voyagrr-net

volumes:
  keycloak-database-data:
  user-database-data:
  storage-database-data:
  encoding-database-data:
  processing-database-data:
  metadata-database-data:
  analysis-database-data:
  recognition-database-data:
  trip-database-data:
  minio-data:
  prometheus-data:
  grafana-storage:
  loki-data:
  analysis-models:

networks:
  voyagrr-net:
    driver: bridge
