version: "3.8"

services:
  keycloak-database:
    image: postgres:17
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak123
    ports:
      - '5433:5432'
    volumes:
      - keycloak-database-data:/var/lib/postgresql/data
    networks:
      - voyagrr-net

  user-service-database:
    image: postgres:17
    environment:
      POSTGRES_DB: user_service_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - user-database-data:/var/lib/postgresql/data
    networks:
      - voyagrr-net

  storage-service-database:
    image: postgres:17
    environment:
      POSTGRES_DB: storage_service_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5435:5432'
    volumes:
      - storage-database-data:/var/lib/postgresql/data
    networks:
      - voyagrr-net

  eureka:
    build: ./discovery-service
    ports:
      - '8761:8761'
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - voyagrr-net

  api-gateway:
    build: ./api-gateway
    ports:
      - '8080:8080'
    depends_on:
      - eureka
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - voyagrr-net

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    command: start-dev
    depends_on:
      - keycloak-database
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-database:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
      KC_HTTP_PORT: 8070
    ports:
      - "8070:8070"
    networks:
      - voyagrr-net

  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    networks:
      - voyagrr-net

  user-service:
    build: ./user-service
    ports:
      - '8081:8081'
    depends_on:
      - eureka
      - api-gateway
      - user-service-database
      - keycloak
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-service-database:5432/user_service_database
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - voyagrr-net

  storage-service:
    build: ./storage-service
    ports:
      - '8082:8082'
    depends_on:
      - eureka
      - api-gateway
      - storage-service-database
      - minio
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://storage-service-database:5432/storage_service_database
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - voyagrr-net

volumes:
  keycloak-database-data:
  user-database-data:
  storage-database-data:
  minio-data:

networks:
  voyagrr-net:
    driver: bridge