syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.voyagrr.common.proto";
option java_outer_classname = "StorageProto";
option java_generate_equals_and_hash = true;
option java_string_check_utf8 = true;

service StorageService {
  rpc UpdateFileProcessingStatus(UpdateFileProcessingStatusRequest) returns (UpdateFileProcessingStatusResponse);
}

message UpdateFileProcessingStatusRequest {
  int64 file_id = 1;
  string status = 2;
}

message UpdateFileProcessingStatusResponse {
  bool success = 1;
}
