syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.voyagrr.common.proto";
option java_outer_classname = "StorageProto";
option java_generate_equals_and_hash = true;
option java_string_check_utf8 = true;

service StorageService {
  rpc UpdateFileProcessingStatus(UpdateFileProcessingStatusRequest) returns (UpdateFileProcessingStatusResponse);
  rpc HasPermissionForFile(HasPermissionForFileRequest) returns (HasPermissionForFileResponse);
  rpc GetFileIdsOfDirectory(GetFileIdsOfDirectoryRequest) returns (GetFileIdsOfDirectoryResponse);
  rpc CreateDirectoryForTrip(CreateDirectoryForTripRequest) returns (CreateDirectoryForTripResponse);
  rpc CreateOrValidateGroupForTrip(CreateOrValidateGroupForTripRequest) returns (CreateOrValidateGroupForTripResponse);
  rpc CreateDefaultSampleDirectoryForUser(CreateDefaultSampleDirectoryForUserRequest) returns (CreateDefaultSampleDirectoryForUserResponse);
  rpc GetTripProcessingData(GetTripProcessingDataRequest)
      returns (GetTripProcessingDataResponse);
  rpc GetGroupIdsForUser(GetGroupIdsForUserRequest) returns (GetGroupIdsForUserResponse);
}

message UpdateFileProcessingStatusRequest {
  int64 file_id = 1;
  string status = 2;
}

message UpdateFileProcessingStatusResponse {
  bool success = 1;
}

message HasPermissionForFileRequest {
  int64 file_id = 1;
  string keycloak_user_id = 2;
  string permission = 3;
}

message HasPermissionForFileResponse {
  bool allowed = 1;
}

message GetFileIdsOfDirectoryRequest {
  int64 directory_id = 1;
  string keycloak_user_id = 2;
  string permission = 3;
}

message GetFileIdsOfDirectoryResponse {
  repeated int64 file_id = 1;

}

message CreateDirectoryForTripRequest {
  string keycloak_user_id = 1;
  string directory_name = 2;
}

message CreateDirectoryForTripResponse {
  int64 directory_id = 1;
}

message CreateOrValidateGroupForTripRequest {
  int64 group_id = 1;
  string group_name = 2;
  string owner_id = 3;
  repeated string keycloak_user_id = 4;
}

message CreateOrValidateGroupForTripResponse {
  int64 group_id = 1;
}

message CreateDefaultSampleDirectoryForUserRequest {
  string keycloak_user_id = 1;
}

message CreateDefaultSampleDirectoryForUserResponse {
  int64 directory_id = 1;
}

message GetTripProcessingDataRequest {
  int64 trip_id = 1;
  int64 group_id = 2;
}

message GroupMember {
  string keycloak_user_id = 1;
  string sample_directory = 2;
}

message GetTripProcessingDataResponse {
  repeated GroupMember group_members = 2;
}

message GetGroupIdsForUserRequest {
  string keycloak_user_id = 1;
}

message GetGroupIdsForUserResponse {
  repeated int64 group_id = 1;
}
