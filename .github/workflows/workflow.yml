name: Deployment Pipeline

on:
  push:
    branches: [ main, staging ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/voyagrr
  SERVICES: user-service storage-service sharing-service encoding-service api-gateway discovery-service

jobs:
  build-images:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - run: mvn clean package -DskipTests

      - uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build images
        run: |
          for service in $SERVICES; do
            docker build -t $service:${{ github.ref_name }} -f $service/Dockerfile .
          done

  push-images:
    runs-on: self-hosted
    needs: build-images

    steps:
      - uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Tag and push images
        run: |
          for service in $SERVICES; do
            docker tag $service:${{ github.ref_name }} $REGISTRY/$IMAGE_NAMESPACE/$service:${{ github.ref_name }}
            docker push $REGISTRY/$IMAGE_NAMESPACE/$service:${{ github.ref_name }}
          done

  deploy:
    runs-on: self-hosted
    needs: push-images
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Rsync Grafana & Prometheus (if changed)
        if: |
          contains(join(github.event.commits.*.modified), 'grafana/') ||
          contains(join(github.event.commits.*.added), 'grafana/') ||
          contains(join(github.event.commits.*.modified), 'prometheus/') ||
          contains(join(github.event.commits.*.added), 'prometheus/')
        run: |
          rsync -avz -e "ssh" ./grafana ./prometheus \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/deployment/voyagrr

      - name: Deploy to remote server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << "EOF"
            set -e
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            SERVICES=$(echo "$SERVICES" | xargs)

            for service in $SERVICES; do
              docker pull ghcr.io/${{ github.repository_owner }}/voyagrr/$service:${{ github.ref_name }}
            done

            cd ~/deployment/voyagrr

            if [ "${{ github.ref_name }}" = "main" ]; then
              export SPRING_PROFILES_ACTIVE=production
            else
              export SPRING_PROFILES_ACTIVE=staging
            fi

            export IMAGE_NAMESPACE=${{ github.repository_owner }}/voyagrr
            export TAG=${{ github.ref_name }}

            # Export secrets

            export KEYCLOAK_ADMIN="${{ secrets.KEYCLOAK_ADMIN }}"
            export KEYCLOAK_ADMIN_PASSWORD="${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}"

            export KEYCLOAK_DB_HOST="${{ secrets.KEYCLOAK_DB_HOST }}"
            export KEYCLOAK_DB_PORT="${{ secrets.KEYCLOAK_DB_PORT }}"
            export KEYCLOAK_DB_NAME="${{ secrets.KEYCLOAK_DB_NAME }}"
            export KEYCLOAK_DB_USER="${{ secrets.KEYCLOAK_DB_USER }}"
            export KEYCLOAK_DB_PASSWORD="${{ secrets.KEYCLOAK_DB_PASSWORD }}"

            export MINIO_ENDPOINT="${{ secrets.MINIO_ENDPOINT }}"
            export MINIO_ACCESS_KEY="${{ secrets.MINIO_ACCESS_KEY }}"
            export MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY }}"
            export MINIO_BUCKET="${{ secrets.MINIO_BUCKET }}"

            export KEYCLOAK_URL="${{ secrets.KEYCLOAK_URL }}"
            export KEYCLOAK_REALM="${{ secrets.KEYCLOAK_REALM }}"
            export KEYCLOAK_AUTH_CLIENT_ID="${{ secrets.KEYCLOAK_CLIENT_ID }}"
            export KEYCLOAK_AUTH_CLIENT_SECRET="${{ secrets.KEYCLOAK_CLIENT_SECRET }}"

            export STORAGE_GRPC_SERVICE_PORT="${{ secrets.STORAGE_GRPC_SERVICE_PORT }}"
            export SHARING_GRPC_SERVICE_PORT="${{ secrets.SHARING_GRPC_SERVICE_PORT }}"

            export USER_DB_HOST="${{ secrets.USER_DB_HOST }}"
            export USER_DB_PORT="${{ secrets.USER_DB_PORT }}"
            export USER_DB_NAME="${{ secrets.USER_DB_NAME }}"
            export USER_DB_USER="${{ secrets.USER_DB_USER }}"
            export USER_DB_PASSWORD="${{ secrets.USER_DB_PASSWORD }}"

            export STORAGE_DB_HOST="${{ secrets.STORAGE_DB_HOST }}"
            export STORAGE_DB_PORT="${{ secrets.STORAGE_DB_PORT }}"
            export STORAGE_DB_NAME="${{ secrets.STORAGE_DB_NAME }}"
            export STORAGE_DB_USER="${{ secrets.STORAGE_DB_USER }}"
            export STORAGE_DB_PASSWORD="${{ secrets.STORAGE_DB_PASSWORD }}"

            export SHARING_DB_HOST="${{ secrets.SHARING_DB_HOST }}"
            export SHARING_DB_PORT="${{ secrets.SHARING_DB_PORT }}"
            export SHARING_DB_NAME="${{ secrets.SHARING_DB_NAME }}"
            export SHARING_DB_USER="${{ secrets.SHARING_DB_USER }}"
            export SHARING_DB_PASSWORD="${{ secrets.SHARING_DB_PASSWORD }}"

            export ENCODING_DB_HOST="${{ secrets.ENCODING_DB_HOST }}"
            export ENCODING_DB_PORT="${{ secrets.ENCODING_DB_PORT }}"
            export ENCODING_DB_NAME="${{ secrets.ENCODING_DB_NAME }}"
            export ENCODING_DB_USER="${{ secrets.ENCODING_DB_USER }}"
            export ENCODING_DB_PASSWORD="${{ secrets.ENCODING_DB_PASSWORD }}"

            export EUREKA_CLIENT_SERVICEURL_DEFAULTZONE="${{ secrets.EUREKA_CLIENT_SERVICEURL_DEFAULTZONE }}"

            docker compose down
            docker compose up -d
          EOF