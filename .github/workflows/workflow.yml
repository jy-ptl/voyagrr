name: Deployment Pipeline

on:
  push:
    branches: [ main, staging ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/voyagrr
  SERVICES: user-service storage-service sharing-service processing-service api-gateway discovery-service
  PYTHON_SERVICES: encoding-service analysis-service metadata-service

jobs:
  build-images:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Clean Docker before build
        run: |
          docker builder prune -af
          docker image prune -af

      - run: mvn clean package -DskipTests

      - uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build images
        run: |
          for service in $SERVICES; do
            docker build -t $service:${{ github.ref_name }} -f $service/Dockerfile . &
          done

          for service in $PYTHON_SERVICES; do
            docker build -t $service:${{ github.ref_name }} -f $service/Dockerfile $service &
          done

          wait

  push-images:
    runs-on: self-hosted
    needs: build-images

    steps:
      - uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Tag and push images
        run: |
          for service in $SERVICES $PYTHON_SERVICES; do
            docker tag $service:${{ github.ref_name }} $REGISTRY/$IMAGE_NAMESPACE/$service:${{ github.ref_name }}
            docker push $REGISTRY/$IMAGE_NAMESPACE/$service:${{ github.ref_name }}
          done

  deploy:
    runs-on: self-hosted
    needs: push-images
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Rsync Grafana & Prometheus (if changed)
        if: |
          contains(join(github.event.commits.*.modified), 'grafana/') ||
          contains(join(github.event.commits.*.added), 'grafana/') ||
          contains(join(github.event.commits.*.modified), 'prometheus/') ||
          contains(join(github.event.commits.*.added), 'prometheus/')
        run: |
          rsync -avz -e "ssh" ./grafana ./prometheus \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/deployment/voyagrr

      - name: Deploy to remote server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << EOF
            set -eu

            SERVICES="user-service storage-service sharing-service processing-service api-gateway discovery-service"
            PYTHON_SERVICES="encoding-service analysis-service metadata-service"

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            for service in $SERVICES $PYTHON_SERVICES; do
              docker pull ghcr.io/${{ github.repository_owner }}/voyagrr/$service:${{ github.ref_name }}
            done

            cd ~/deployment/voyagrr

            if [ "${{ github.ref_name }}" = "main" ]; then
              SPRING_PROFILES_ACTIVE=production
            else
              SPRING_PROFILES_ACTIVE=staging
            fi

            cat > .env <<EOL
            SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
            IMAGE_NAMESPACE=${{ github.repository_owner }}/voyagrr
            TAG=${{ github.ref_name }}

            KEYCLOAK_ADMIN=${{ secrets.KEYCLOAK_ADMIN }}
            KEYCLOAK_ADMIN_PASSWORD=${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}

            KEYCLOAK_DB_HOST=${{ secrets.KEYCLOAK_DB_HOST }}
            KEYCLOAK_DB_PORT=${{ secrets.KEYCLOAK_DB_PORT }}
            KEYCLOAK_DB_NAME=${{ secrets.KEYCLOAK_DB_NAME }}
            KEYCLOAK_DB_USER=${{ secrets.KEYCLOAK_DB_USER }}
            KEYCLOAK_DB_PASSWORD=${{ secrets.KEYCLOAK_DB_PASSWORD }}

            KEYCLOAK_URL=${{ secrets.KEYCLOAK_URL }}
            KEYCLOAK_REALM=${{ secrets.KEYCLOAK_REALM }}
            KEYCLOAK_CLIENT_ID=${{ secrets.KEYCLOAK_CLIENT_ID }}
            KEYCLOAK_CLIENT_SECRET=${{ secrets.KEYCLOAK_CLIENT_SECRET }}

            MINIO_ENDPOINT=${{ secrets.MINIO_ENDPOINT }}
            PYTHON_MINIO_ENDPOINT=${{ secrets.PYTHON_MINIO_ENDPOINT }}
            MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
            MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
            MINIO_BUCKET=${{ secrets.MINIO_BUCKET }}
            PROCESSED_VIDEO_BUCKET=${{ secrets.PROCESSED_VIDEO_BUCKET }}

            STORAGE_GRPC_SERVICE_PORT=${{ secrets.STORAGE_GRPC_SERVICE_PORT }}
            SHARING_GRPC_SERVICE_PORT=${{ secrets.SHARING_GRPC_SERVICE_PORT }}
            PROCESSING_GRPC_SERVICE_PORT=${{ secrets.PROCESSING_GRPC_SERVICE_PORT }}

            USER_DB_HOST=${{ secrets.USER_DB_HOST }}
            USER_DB_PORT=${{ secrets.USER_DB_PORT }}
            USER_DB_NAME=${{ secrets.USER_DB_NAME }}
            USER_DB_USER=${{ secrets.USER_DB_USER }}
            USER_DB_PASSWORD=${{ secrets.USER_DB_PASSWORD }}

            STORAGE_DB_HOST=${{ secrets.STORAGE_DB_HOST }}
            STORAGE_DB_PORT=${{ secrets.STORAGE_DB_PORT }}
            STORAGE_DB_NAME=${{ secrets.STORAGE_DB_NAME }}
            STORAGE_DB_USER=${{ secrets.STORAGE_DB_USER }}
            STORAGE_DB_PASSWORD=${{ secrets.STORAGE_DB_PASSWORD }}

            SHARING_DB_HOST=${{ secrets.SHARING_DB_HOST }}
            SHARING_DB_PORT=${{ secrets.SHARING_DB_PORT }}
            SHARING_DB_NAME=${{ secrets.SHARING_DB_NAME }}
            SHARING_DB_USER=${{ secrets.SHARING_DB_USER }}
            SHARING_DB_PASSWORD=${{ secrets.SHARING_DB_PASSWORD }}

            ENCODING_TEMP_DIR=${{ secrets.ENCODING_TEMP_DIR }}
            ENCODING_MAX_WORKERS=${{ secrets.ENCODING_MAX_WORKERS }}

            ENCODING_DB_HOST=${{ secrets.ENCODING_DB_HOST }}
            ENCODING_DB_PORT=${{ secrets.ENCODING_DB_PORT }}
            ENCODING_DB_NAME=${{ secrets.ENCODING_DB_NAME }}
            ENCODING_DB_USER=${{ secrets.ENCODING_DB_USER }}
            ENCODING_DB_PASSWORD=${{ secrets.ENCODING_DB_PASSWORD }}

            PROCESSING_DB_HOST=${{ secrets.PROCESSING_DB_HOST }}
            PROCESSING_DB_PORT=${{ secrets.PROCESSING_DB_PORT }}
            PROCESSING_DB_NAME=${{ secrets.PROCESSING_DB_NAME }}
            PROCESSING_DB_USER=${{ secrets.PROCESSING_DB_USER }}
            PROCESSING_DB_PASSWORD=${{ secrets.PROCESSING_DB_PASSWORD }}

            ANALYSIS_TEMP_DIR=${{ secrets.ANALYSIS_TEMP_DIR }}

            ANALYSIS_DB_HOST=${{ secrets.ANALYSIS_DB_HOST }}
            ANALYSIS_DB_PORT=${{ secrets.ANALYSIS_DB_PORT }}
            ANALYSIS_DB_NAME=${{ secrets.ANALYSIS_DB_NAME }}
            ANALYSIS_DB_USER=${{ secrets.ANALYSIS_DB_USER }}
            ANALYSIS_DB_PASSWORD=${{ secrets.ANALYSIS_DB_PASSWORD }}

            METADATA_DB_HOST=${{ secrets.METADATA_DB_HOST }}
            METADATA_DB_PORT=${{ secrets.METADATA_DB_PORT }}
            METADATA_DB_NAME=${{ secrets.METADATA_DB_NAME }}
            METADATA_DB_USER=${{ secrets.METADATA_DB_USER }}
            METADATA_DB_PASSWORD=${{ secrets.METADATA_DB_PASSWORD }}

            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${{ secrets.EUREKA_CLIENT_SERVICEURL_DEFAULTZONE }}
            EOL

            docker compose down --remove-orphans
            docker compose pull
            docker compose up -d --force-recreate

          EOF
