name: Deployment Pipeline

on:
  push:
    branches: [ main, staging ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/voyagrr
  SERVICES: user-service storage-service processing-service trip-service api-gateway discovery-service
  PYTHON_SERVICES: encoding-service analysis-service metadata-service recognition-service

jobs:
  build-images:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3
        with:
          clean: true
          fetch-depth: 0

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Clean Docker before build
        run: |
          docker builder prune -af
          docker image prune -af

      - run: mvn clean package -DskipTests

      - uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build images
        run: |
          for service in $SERVICES; do
            docker build -t $service:${{ github.ref_name }} -f $service/Dockerfile . &
          done

          for service in $PYTHON_SERVICES; do
            docker build -t $service:${{ github.ref_name }} -f $service/Dockerfile $service &
          done

          wait

  push-images:
    runs-on: self-hosted
    needs: build-images

    steps:
      - uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Tag and push images
        run: |
          for service in $SERVICES $PYTHON_SERVICES; do
            docker tag $service:${{ github.ref_name }} $REGISTRY/$IMAGE_NAMESPACE/$service:${{ github.ref_name }}
            docker push $REGISTRY/$IMAGE_NAMESPACE/$service:${{ github.ref_name }}
          done

  deploy:
    runs-on: self-hosted
    needs: push-images
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync monitoring configs
        run: |
          rsync -avz -e "ssh" ./grafana/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/deployment/voyagrr/grafana/
          rsync -avz -e "ssh" ./prometheus/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/deployment/voyagrr/prometheus/
          rsync -avz -e "ssh" ./loki/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/deployment/voyagrr/loki/
          rsync -avz -e "ssh" ./promtail/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/deployment/voyagrr/promtail/
          rsync -avz -e "ssh" ./tempo/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/deployment/voyagrr/tempo/

      - name: Deploy to remote server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << "EOF"
            set -e

            mkdir -p ~/deployment/voyagrr
            cd ~/deployment/voyagrr

            printf "REGISTRY=${{ env.REGISTRY }}\n" > .env
            printf "IMAGE_NAMESPACE=${{ github.repository_owner }}/voyagrr\n" >> .env
            printf "TAG=${{ github.ref_name }}\n" >> .env
            printf "SPRING_PROFILES_ACTIVE=${{ github.ref_name == 'main' && 'production' || 'staging' }}\n" >> .env

            printf "KEYCLOAK_ADMIN=${{ secrets.KEYCLOAK_ADMIN }}\n" >> .env
            printf "KEYCLOAK_ADMIN_PASSWORD=${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}\n" >> .env
            printf "KEYCLOAK_DB_HOST=${{ secrets.KEYCLOAK_DB_HOST }}\n" >> .env
            printf "KEYCLOAK_DB_PORT=${{ secrets.KEYCLOAK_DB_PORT }}\n" >> .env
            printf "KEYCLOAK_DB_NAME=${{ secrets.KEYCLOAK_DB_NAME }}\n" >> .env
            printf "KEYCLOAK_DB_USER=${{ secrets.KEYCLOAK_DB_USER }}\n" >> .env
            printf "KEYCLOAK_DB_PASSWORD=${{ secrets.KEYCLOAK_DB_PASSWORD }}\n" >> .env

            printf "MINIO_ENDPOINT=${{ secrets.MINIO_ENDPOINT }}\n" >> .env
            printf "PYTHON_MINIO_ENDPOINT=${{ secrets.PYTHON_MINIO_ENDPOINT }}\n" >> .env
            printf "MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}\n" >> .env
            printf "MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}\n" >> .env
            printf "MINIO_BUCKET=${{ secrets.MINIO_BUCKET }}\n" >> .env
            printf "PROCESSED_VIDEO_BUCKET=${{ secrets.PROCESSED_VIDEO_BUCKET }}\n" >> .env

            printf "KEYCLOAK_URL=${{ secrets.KEYCLOAK_URL }}\n" >> .env
            printf "KEYCLOAK_REALM=${{ secrets.KEYCLOAK_REALM }}\n" >> .env
            printf "KEYCLOAK_CLIENT_ID=${{ secrets.KEYCLOAK_CLIENT_ID }}\n" >> .env
            printf "KEYCLOAK_CLIENT_SECRET=${{ secrets.KEYCLOAK_CLIENT_SECRET }}\n" >> .env

            printf "STORAGE_GRPC_SERVICE_PORT=${{ secrets.STORAGE_GRPC_SERVICE_PORT }}\n" >> .env
            printf "PROCESSING_GRPC_SERVICE_PORT=${{ secrets.PROCESSING_GRPC_SERVICE_PORT }}\n" >> .env
            printf "TRIP_GRPC_SERVICE_PORT=${{ secrets.TRIP_GRPC_SERVICE_PORT }}\n" >> .env

            printf "USER_DB_HOST=${{ secrets.USER_DB_HOST }}\n" >> .env
            printf "USER_DB_PORT=${{ secrets.USER_DB_PORT }}\n" >> .env
            printf "USER_DB_NAME=${{ secrets.USER_DB_NAME }}\n" >> .env
            printf "USER_DB_USER=${{ secrets.USER_DB_USER }}\n" >> .env
            printf "USER_DB_PASSWORD=${{ secrets.USER_DB_PASSWORD }}\n" >> .env

            printf "STORAGE_DB_HOST=${{ secrets.STORAGE_DB_HOST }}\n" >> .env
            printf "STORAGE_DB_PORT=${{ secrets.STORAGE_DB_PORT }}\n" >> .env
            printf "STORAGE_DB_NAME=${{ secrets.STORAGE_DB_NAME }}\n" >> .env
            printf "STORAGE_DB_USER=${{ secrets.STORAGE_DB_USER }}\n" >> .env
            printf "STORAGE_DB_PASSWORD=${{ secrets.STORAGE_DB_PASSWORD }}\n" >> .env

            printf "ENCODING_TEMP_DIR=${{ secrets.ENCODING_TEMP_DIR }}\n" >> .env
            printf "ENCODING_MAX_WORKERS=${{ secrets.ENCODING_MAX_WORKERS }}\n" >> .env

            printf "ENCODING_DB_HOST=${{ secrets.ENCODING_DB_HOST }}\n" >> .env
            printf "ENCODING_DB_PORT=${{ secrets.ENCODING_DB_PORT }}\n" >> .env
            printf "ENCODING_DB_NAME=${{ secrets.ENCODING_DB_NAME }}\n" >> .env
            printf "ENCODING_DB_USER=${{ secrets.ENCODING_DB_USER }}\n" >> .env
            printf "ENCODING_DB_PASSWORD=${{ secrets.ENCODING_DB_PASSWORD }}\n" >> .env

            printf "PROCESSING_DB_HOST=${{ secrets.PROCESSING_DB_HOST }}\n" >> .env
            printf "PROCESSING_DB_PORT=${{ secrets.PROCESSING_DB_PORT }}\n" >> .env
            printf "PROCESSING_DB_NAME=${{ secrets.PROCESSING_DB_NAME }}\n" >> .env
            printf "PROCESSING_DB_USER=${{ secrets.PROCESSING_DB_USER }}\n" >> .env
            printf "PROCESSING_DB_PASSWORD=${{ secrets.PROCESSING_DB_PASSWORD }}\n" >> .env

            printf "TRIP_DB_HOST=${{ secrets.TRIP_DB_HOST }}\n" >> .env
            printf "TRIP_DB_PORT=${{ secrets.TRIP_DB_PORT }}\n" >> .env
            printf "TRIP_DB_NAME=${{ secrets.TRIP_DB_NAME }}\n" >> .env
            printf "TRIP_DB_USER=${{ secrets.TRIP_DB_USER }}\n" >> .env
            printf "TRIP_DB_PASSWORD=${{ secrets.TRIP_DB_PASSWORD }}\n" >> .env

            printf "ANALYSIS_TEMP_DIR=${{ secrets.ANALYSIS_TEMP_DIR }}\n" >> .env

            printf "ANALYSIS_DB_HOST=${{ secrets.ANALYSIS_DB_HOST }}\n" >> .env
            printf "ANALYSIS_DB_PORT=${{ secrets.ANALYSIS_DB_PORT }}\n" >> .env
            printf "ANALYSIS_DB_NAME=${{ secrets.ANALYSIS_DB_NAME }}\n" >> .env
            printf "ANALYSIS_DB_USER=${{ secrets.ANALYSIS_DB_USER }}\n" >> .env
            printf "ANALYSIS_DB_PASSWORD=${{ secrets.ANALYSIS_DB_PASSWORD }}\n" >> .env

            printf "RECOGNITION_TEMP_DIR=${{ secrets.RECOGNITION_TEMP_DIR }}\n" >> .env
            printf "RECPGNITION_MATCH_THRESHOLD=${{ secrets.RECPGNITION_MATCH_THRESHOLD }}\n" >> .env
            printf "RECOGNITION_MAX_WORKERS"=${{ secrets.RECOGNITION_MAX_WORKERS }}\n" >> .env

            printf "RECOGNITION_DB_HOST=${{ secrets.RECOGNITION_DB_HOST }}\n" >> .env
            printf "RECOGNITION_DB_PORT=${{ secrets.RECOGNITION_DB_PORT }}\n" >> .env
            printf "RECOGNITION_DB_NAME=${{ secrets.RECOGNITION_DB_NAME }}\n" >> .env
            printf "RECOGNITION_DB_USER=${{ secrets.RECOGNITION_DB_USER }}\n" >> .env
            printf "RECOGNITION_DB_PASSWORD=${{ secrets.RECOGNITION_DB_PASSWORD }}\n" >> .env

            printf "METADATA_DB_HOST=${{ secrets.METADATA_DB_HOST }}\n" >> .env
            printf "METADATA_DB_PORT=${{ secrets.METADATA_DB_PORT }}\n" >> .env
            printf "METADATA_DB_NAME=${{ secrets.METADATA_DB_NAME }}\n" >> .env
            printf "METADATA_DB_USER=${{ secrets.METADATA_DB_USER }}\n" >> .env
            printf "METADATA_DB_PASSWORD=${{ secrets.METADATA_DB_PASSWORD }}\n" >> .env

            printf "EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${{ secrets.EUREKA_CLIENT_SERVICEURL_DEFAULTZONE }}\n" >> .env

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f
          EOF
